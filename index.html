<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEP</title>
    <link rel="stylesheet" href="./src/styles/style.css">
    <script src="./src/js/script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

</head>

<body>

    <!-- Header -->
    <header>
        <div class="logo">
            <img src="./src/assets/images/logo.svg" alt="E-commerce logo">
        </div>

        <nav>
            <ul class="menu-container">
                <li class="menu-item">
                    <a href="#">Home</a>
                </li>

                <li class="menu-item">
                    <a href="#">Produtos</a>
                </li>

                <li class="menu-item">
                    <a href="#">Sobre nós</a>
                </li>

                <li class="menu-item">
                    <a href="#">Contato</a>
                </li>
            </ul>
        </nav>

        <div class="btn-container">
            <a href="">
                <button type="button">
                    Login
                </button>
            </a>
        </div>
    </header>


    <!-- Main -->
    <main>

        <div class="notebook-image">
            <img src="./src/assets/images/computador.svg" alt="Notebook-image">
        </div>

        <div class="notebook-data-container">
            <div class="avalation-content">
                <ul>
                    <li class="stars-item"><img src="./src/assets/images/estrela.svg" alt="Estrela-1"
                            draggable="false"><img src="./src/assets/images/estrela.svg" alt="Estrela-2"
                            draggable="false"><img src="./src/assets/images/estrela.svg" alt="Estrela-3"
                            draggable="false"><img src="./src/assets/images/estrela.svg" alt="Estrela-4"
                            draggable="false"><img src="./src/assets/images/estrela.svg" alt="Estrela-5"
                            draggable="false">
                    </li>
                    <li class="star-score-item">5.0 Estrelas</li>
                    <li class="total-ratings-item">(21.671 avaliações)</li>
                </ul>
            </div>

            <div class="notebook-model-content">
                <p>2020 Apple MacBook Pro with Apple M1 Chip (13-inch, 8GB RAM, 256GB SSD Storage) - Space Gray</p>
            </div>

            <div class="sale-container">
                <ul class="sale-content">
                    <li class="price-discount-item">R$5.299,00</li>
                    <li class="original-price-item">R$7.000,00</li>
                    <li class="discount">24,3% OFF</li>
                </ul>
            </div>

            <div class="color-selection-container">

            </div>

            <div class="btn-container">
                <a href="">
                    <button type="button">
                        Adicionar no carrinho
                    </button>
                </a>
            </div>
        </div>
    </main>

    <!-- Informations -->
    <section class="form-section">

        <div class="informations-title">
            <h1>Informações</h1>
        </div>

        <div class="form-container">
            <form>

                <div class="form-group">
                    <label for="nome">Nome completo:</label>
                    <input type="text" id="nome" name="nome" placeholder="Allan Dantas Abreu" required>
                </div>

                <div class="form-group-2">
                    <label for="cpf">CPF:</label>
                    <input type="number" id="cpf" name="cpf" placeholder="123.456.789-10" required>
                </div>

                <div class="form-group">
                    <label for="cep">CEP:</label>
                    <input type="number" id="cep" name="cep" placeholder="12345-123" required>
                </div>

                <div class="form-group">
                    <label for="rua">Rua:</label>
                    <input type="text" id="rua" name="rua" required>
                </div>

                <div class="form-group-2">
                    <label for="numero">Número:</label>
                    <input type="number" id="numero" name="numero" required>
                </div>

                <div class="form-group">
                    <label for="complemento">Complemento:</label>
                    <input type="text" id="complemento" name="complemento">
                </div>

                <div class="estado-btn-container">
                    <div class="form-group">
                        <label for="estado">Estado:</label>
                        <select id="estado" name="estado" required>
                            <option value="">Selecione seu estado</option>
                            <option value="AC">Acre</option>
                            <option value="AL">Alagoas</option>
                            <option value="AP">Amapá</option>
                            <option value="AM">Amazonas</option>
                            <option value="BA">Bahia</option>
                            <option value="CE">Ceará</option>
                            <option value="DF">Distrito Federal</option>
                            <option value="ES">Espírito Santo</option>
                            <option value="GO">Goiás</option>
                            <option value="MA">Maranhão</option>
                            <option value="MT">Mato Grosso</option>
                            <option value="MS">Mato Grosso do Sul</option>
                            <option value="MG">Minas Gerais</option>
                            <option value="PA">Pará</option>
                            <option value="PB">Paraíba</option>
                            <option value="PR">Paraná</option>
                            <option value="PE">Pernambuco</option>
                            <option value="PI">Piauí</option>
                            <option value="RJ">Rio de Janeiro</option>
                            <option value="RN">Rio Grande do Norte</option>
                            <option value="RS">Rio Grande do Sul</option>
                            <option value="RO">Rondônia</option>
                            <option value="RR">Roraima</option>
                            <option value="SC">Santa Catarina</option>
                            <option value="SP">São Paulo</option>
                            <option value="SE">Sergipe</option>
                            <option value="TO">Tocantins</option>
                        </select>
                    </div>

                    <div class="btn-container">
                        <a href="">
                            <button type="button">
                                Enviar
                            </button>
                        </a>
                    </div>
                </div>

                <div class="form-group">
                    <label for="bairro">Bairro:</label>
                    <input type="text" id="bairro" name="bairro" required>
                </div>
            </form>
        </div>

    </section>

    <!-- Footer -->
    <footer>

    </footer>

</body>

</html>
